
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3">
            </div>
            <div class="col-md-6">
                <form action="h1" name="Registration" method="get">
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" name="sno" id="sno" placeholder="Student no" class="form-control">
                        </div>
                         <div class="col-md-6">
                            <input type="text" name="sname" id="sname" placeholder="Student name" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" name="marks" id="marks" placeholder="Student marks" class="form-control">
                        </div>
                         <div class="col-md-6">
                            <input type="text" name="branch" id="branch" placeholder="Student branch" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                         <button  type = "submit" class="btn btn-success" >submit</button>
                    </div>
                </form>
            </div>
            <div class="col-md-3"></div>
        </div>
    </div>
</body>
</html>
